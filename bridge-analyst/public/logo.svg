  <!-- Abutments -->
  <rect x="6" y="68.5" width="13" height="7" rx="2" fill="rgba(255,255,255,0.45)"/>
  <rect x="81" y="68.5" width="13" height="7" rx="2" fill="rgba(255,255,255,0.45)"/>
