  <rect x="34" y="22" width="5.5" height="41" rx="2.5" fill="white"/>
  <!-- Right tower -->
  <rect x="60.5" y="22" width="5.5" height="41" rx="2.5" fill="white"/>
  <!-- Cables left tower -->
  <line x1="36.75" y1="27" x2="8" y2="63" stroke="white" stroke-width="1.6" stroke-linecap="round" opacity="0.85"/>
  <line x1="36.75" y1="33" x2="21" y2="63" stroke="white" stroke-width="1.6" stroke-linecap="round" opacity="0.85"/>
  <line x1="36.75" y1="39" x2="34" y2="63" stroke="white" stroke-width="1.6" stroke-linecap="round" opacity="0.85"/>
  <!-- Cables right tower -->
  <line x1="63.25" y1="27" x2="92" y2="63" stroke="white" stroke-width="1.6" stroke-linecap="round" opacity="0.85"/>
  <line x1="63.25" y1="33" x2="79" y2="63" stroke="white" stroke-width="1.6" stroke-linecap="round" opacity="0.85"/>
  <line x1="63.25" y1="39" x2="66" y2="63" stroke="white" stroke-width="1.6" stroke-linecap="round" opacity="0.85"/>
